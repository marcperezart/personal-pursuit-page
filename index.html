<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A serene and beautiful gratitude journal to help you focus on the positive aspects of life.">
    <title>Gratitude Journal | Daily Mindfulness</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>My Gratitude Journal</h1>
            <p class="subtitle">Focus on the good, and the good gets better.</p>
        </header>

        <section class="input-section">
            <textarea id="gratitude-input" placeholder="What are you grateful for today?"></textarea>
            <button id="save-btn">Capture Gratitude</button>
        </section>

        <section class="entries-section">
            <h2>📜 Previous Entries</h2>
            <div id="entries-container">
                <!-- Entries will be added here -->
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
